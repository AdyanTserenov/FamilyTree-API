# ============================================================
# Database — PostgreSQL
# In Docker: postgres hostname resolves via docker network.
# Locally: change to localhost:5432
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/familytree}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT — must match tree-service (family-tree-auth-starter)
# Both services sign/verify with the same secret + HS256
# ============================================================
family.auth.jwt.secret=${FAMILY_AUTH_JWT_SECRET:mySuperSecretKeyThatIsLongEnoughForHMACSHA256Algorithm123456789}
family.auth.jwt.lifetime=${FAMILY_AUTH_JWT_LIFETIME:3600000}

# ============================================================
# Mail (SMTP — Yandex)
# ============================================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.yandex.ru}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# Server
# ============================================================
server.port=${SERVER_PORT:8081}

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
