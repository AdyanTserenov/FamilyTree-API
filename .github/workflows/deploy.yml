name: Deploy API to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e

            echo "=== [0/5] Firewall: block direct access to Spring Boot ports ==="
            sudo ufw deny 8080 2>/dev/null || true
            sudo ufw deny 8081 2>/dev/null || true
            echo "Firewall rules applied (8080, 8081 blocked from outside)"

            echo "=== [1/5] Pulling latest API code ==="
            cd ~/vkr/FamilyTree-API
            git pull origin main

            echo "=== [2/5] Stopping and removing existing containers ==="
            docker stop familytree-auth familytree-tree 2>/dev/null || true
            docker rm familytree-auth familytree-tree 2>/dev/null || true

            echo "=== [3/5] Rebuilding backend containers ==="
            docker compose up --build -d auth-service tree-service

            echo "=== [4/5] Waiting for services to stabilize ==="
            sleep 20

            echo "=== [4/5] Container status ==="
            docker compose ps

            echo "=== [5/5] Health checks ==="
            curl -sf http://localhost:8081/auth/ping > /dev/null && echo "Auth service: OK" || echo "Auth service: FAILED"
            curl -sf http://localhost:8080/actuator/health > /dev/null && echo "Tree service: OK" || echo "Tree service: FAILED"

            echo "=== Deploy complete ==="
