# ============================================================
# Database — PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/familytree
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Mail (SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# JWT (family-tree-auth-starter)
# ============================================================
family.auth.jwt.secret=mySuperSecretKeyThatIsLongEnoughForHMACSHA256Algorithm123456789
family.auth.jwt.lifetime=3600000

# ============================================================
# Media file storage
# ============================================================
media.upload.dir=./uploads

# ============================================================
# Multipart file upload limits
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ============================================================
# App
# ============================================================
app.name=Tree Service
server.port=8080
