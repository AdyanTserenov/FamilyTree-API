# ============================================================
# Database — PostgreSQL
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/familytree}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Mail (SMTP)
# ============================================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.yandex.ru}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@yandex.ru}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# JWT (family-tree-auth-starter)
# ============================================================
family.auth.jwt.secret=${FAMILY_AUTH_JWT_SECRET}
family.auth.jwt.lifetime=${FAMILY_AUTH_JWT_LIFETIME:3600000}

# ============================================================
# S3 / Yandex Object Storage
# ============================================================
s3.access-key=${S3_ACCESS_KEY:}
s3.secret-key=${S3_SECRET_KEY:}
s3.bucket=${S3_BUCKET:familytree}
s3.endpoint=${S3_ENDPOINT:https://storage.yandexcloud.net}
s3.region=${S3_REGION:ru-central1}
# Время жизни presigned URL в минутах (default: 60)
s3.presigned-url-expiry-minutes=${S3_PRESIGNED_URL_EXPIRY_MINUTES:60}

# ============================================================
# Multipart file upload limits
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ============================================================
# App
# ============================================================
app.name=Tree Service
server.port=8080
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ============================================================
# CORS — comma-separated list of allowed frontend origins
# Example: http://158.160.55.234:3000,http://localhost:3000
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.main.allow-bean-definition-overriding=true

# ============================================================
# Yandex GPT AI integration
# ============================================================
# Set your real credentials here or via environment variables:
#   AI_YANDEX_API_KEY, AI_YANDEX_FOLDER_ID
ai.yandex.api-key=${AI_YANDEX_API_KEY:}
ai.yandex.folder-id=${AI_YANDEX_FOLDER_ID:}
ai.yandex.api-url=https://llm.api.cloud.yandex.net/foundationModels/v1/completion
# ============================================================
# SpringDoc / Swagger UI — disabled in production
# Enable locally via application-local.properties
# ============================================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


