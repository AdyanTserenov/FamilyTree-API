# ============================================================
# Database — PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/familytree
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Mail (SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# JWT (family-tree-auth-starter)
# ============================================================
family.auth.jwt.secret=mySuperSecretKeyThatIsLongEnoughForHMACSHA256Algorithm123456789
family.auth.jwt.lifetime=3600000

# ============================================================
# Media file storage
# ============================================================
media.upload.dir=./uploads

# ============================================================
# Multipart file upload limits
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ============================================================
# App
# ============================================================
app.name=Tree Service
server.port=8080

# ============================================================
# Yandex GPT AI integration
# ============================================================
# Set your real credentials here or via environment variables:
#   AI_YANDEX_API_KEY, AI_YANDEX_FOLDER_ID
ai.yandex.api-key=${AI_YANDEX_API_KEY:}
ai.yandex.folder-id=${AI_YANDEX_FOLDER_ID:}
ai.yandex.api-url=https://llm.api.cloud.yandex.net/foundationModels/v1/completion

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
