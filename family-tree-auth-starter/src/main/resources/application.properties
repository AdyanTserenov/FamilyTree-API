# Family Tree Auth Starter Configuration
# Override these in your application.properties

# JWT Configuration
# IMPORTANT: Override JWT_SECRET env var in production — never use the default
family.auth.jwt.secret=${JWT_SECRET:changeme-set-a-strong-secret-in-production-env}
family.auth.jwt.lifetime=${JWT_LIFETIME:3600000}

# Email Configuration
family.auth.mail.host=${MAIL_HOST:smtp.example.com}
family.auth.mail.port=${MAIL_PORT:587}
family.auth.mail.username=${MAIL_USERNAME:}
family.auth.mail.password=${MAIL_PASSWORD:}
family.auth.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
family.auth.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}

# Database (optional, if using JPA)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}