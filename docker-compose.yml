version: "3.9"

# ============================================================
# Family Tree API — Docker Compose
# Services: PostgreSQL, auth-service, tree-service
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — shared database for both services
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: familytree-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: familytree
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run tree-service DDL on first start
      - ./tree-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d familytree"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Resource limits — PostgreSQL is lightweight
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - familytree-net

  # ──────────────────────────────────────────────────────────
  # auth-service  (port 8081)
  # ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: familytree-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familytree
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # JWT (must match tree-service)
      FAMILY_AUTH_JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyThatIsLongEnoughForHMACSHA256Algorithm123456789}
      FAMILY_AUTH_JWT_LIFETIME: 3600000
      # Mail
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.yandex.ru}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Frontend base URL (used in email links)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # Server
      SERVER_PORT: 8081
    # JVM tuning — limit heap, reduce GC threads, use serial GC for low-CPU env
    command: >
      java
      -Xms128m -Xmx256m
      -XX:+UseSerialGC
      -XX:ActiveProcessorCount=1
      -Djava.security.egd=file:/dev/./urandom
      -jar app.jar
    ports:
      - "8081:8081"
    # Resource limits — 1 vCPU shared, 384MB RAM
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - familytree-net

  # ──────────────────────────────────────────────────────────
  # tree-service  (port 8080)
  # ──────────────────────────────────────────────────────────
  tree-service:
    build:
      context: .
      dockerfile: tree-service/Dockerfile
    container_name: familytree-tree
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familytree
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # JWT (must match auth-service)
      FAMILY_AUTH_JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyThatIsLongEnoughForHMACSHA256Algorithm123456789}
      FAMILY_AUTH_JWT_LIFETIME: 3600000
      # Mail (same credentials as auth-service)
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.yandex.ru}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Frontend base URL (used in invite links)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # Yandex GPT AI (optional — leave blank to disable)
      AI_YANDEX_API_KEY: ${AI_YANDEX_API_KEY:-}
      AI_YANDEX_FOLDER_ID: ${AI_YANDEX_FOLDER_ID:-}
      # S3 / Yandex Object Storage
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-familytree}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://storage.yandexcloud.net}
      S3_REGION: ${S3_REGION:-ru-central1}
      # Server
      SERVER_PORT: 8080
    # JVM tuning — limit heap, reduce GC threads, use serial GC for low-CPU env
    command: >
      java
      -Xms128m -Xmx256m
      -XX:+UseSerialGC
      -XX:ActiveProcessorCount=1
      -Djava.security.egd=file:/dev/./urandom
      -jar app.jar
    ports:
      - "8080:8080"
    # Resource limits — 1 vCPU shared, 384MB RAM
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - familytree-net

# ──────────────────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  familytree-net:
    driver: bridge
