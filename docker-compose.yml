version: "3.9"

# ============================================================
# Family Tree API — Docker Compose
# Services: auth-service, tree-service
# Database: Yandex Managed Service for PostgreSQL (external)
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # auth-service  (port 8081)
  # ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: familytree-auth
    restart: unless-stopped
    environment:
      # Database — Yandex Managed PostgreSQL
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # JWT (must match tree-service)
      FAMILY_AUTH_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
      FAMILY_AUTH_JWT_LIFETIME: 3600000
      # Mail
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.yandex.ru}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Frontend base URL (used in email links)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # CORS allowed origins — comma-separated list of frontend URLs
      # Example: http://158.160.55.234:3000,http://localhost:3000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Server
      SERVER_PORT: 8081
    volumes:
      - /home/atserenov/.postgresql/root.crt:/root/.postgresql/root.crt:ro
    # JVM tuning — limit heap, reduce GC threads, use serial GC for low-CPU env
    command: >
      java
      -Xms128m -Xmx256m
      -XX:+UseSerialGC
      -XX:ActiveProcessorCount=1
      -Djava.security.egd=file:/dev/./urandom
      -jar app.jar
    ports:
      - "8081:8081"
    # Resource limits — 1 vCPU shared, 384MB RAM
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - familytree-net

  # ──────────────────────────────────────────────────────────
  # tree-service  (port 8080)
  # ──────────────────────────────────────────────────────────
  tree-service:
    build:
      context: .
      dockerfile: tree-service/Dockerfile
    container_name: familytree-tree
    restart: unless-stopped
    environment:
      # Database — Yandex Managed PostgreSQL
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # JWT (must match auth-service)
      FAMILY_AUTH_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
      FAMILY_AUTH_JWT_LIFETIME: 3600000
      # Mail (same credentials as auth-service)
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.yandex.ru}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Frontend base URL (used in invite links)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # CORS allowed origins — comma-separated list of frontend URLs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Yandex GPT AI (optional — leave blank to disable)
      AI_YANDEX_API_KEY: ${AI_YANDEX_API_KEY:-}
      AI_YANDEX_FOLDER_ID: ${AI_YANDEX_FOLDER_ID:-}
      # S3 / Yandex Object Storage
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-familytree}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://storage.yandexcloud.net}
      S3_REGION: ${S3_REGION:-ru-central1}
      # Server
      SERVER_PORT: 8080
    volumes:
      - /home/atserenov/.postgresql/root.crt:/root/.postgresql/root.crt:ro
    # JVM tuning — limit heap, reduce GC threads, use serial GC for low-CPU env
    command: >
      java
      -Xms128m -Xmx256m
      -XX:+UseSerialGC
      -XX:ActiveProcessorCount=1
      -Djava.security.egd=file:/dev/./urandom
      -jar app.jar
    ports:
      - "8080:8080"
    # Resource limits — 1 vCPU shared, 384MB RAM
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - familytree-net

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  familytree-net:
    driver: bridge
